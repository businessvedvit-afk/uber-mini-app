<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Uber Student Ride</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            background-color: #000000; 
            color: #ffffff; 
            margin: 0; 
            padding: 20px; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            height: 90vh; 
        }
        .card { 
            background: #1f1f1f; 
            border-radius: 16px; 
            padding: 28px; 
            text-align: center; 
            width: 100%; 
            max-width: 320px; 
            box-shadow: 0 8px 24px rgba(0,0,0,0.6); 
        }
        h1 { 
            font-size: 26px; 
            margin-bottom: 10px; 
            font-weight: 700; 
            letter-spacing: -0.5px;
        }
        p { 
            font-size: 14px; 
            color: #b0b0b0; 
            margin-bottom: 26px; 
            line-height: 1.4;
        }
        .badge { 
            background-color: #2eb82e; 
            color: white; 
            padding: 5px 14px; 
            border-radius: 20px; 
            font-size: 11px; 
            font-weight: 600;
            display: inline-block; 
            margin-bottom: 18px; 
            text-transform: uppercase;
        }
        .btn { 
            background-color: #ffffff; 
            color: #000000; 
            border: none; 
            padding: 16px 30px; 
            font-size: 16px; 
            font-weight: 700; 
            border-radius: 10px; 
            cursor: pointer; 
            width: 100%; 
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="badge">Student Exclusive</div>
        <h1>Uber Free Ride</h1>
        <p>Get 100% off on your ride under 1 KM. Valid for verified college students only.</p>
        <button class="btn" onclick="startRide()">Book Free Ride</button>
    </div>
    <script>
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();
        function startRide() {
            tg.openLink(window.location.origin + '/launch-ride');
        }
    </script>
</body>
</html>
